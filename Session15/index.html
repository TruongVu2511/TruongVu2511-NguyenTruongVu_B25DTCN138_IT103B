<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản Lý Công Việc - Todo List</title>
    <link rel="stylesheet" href="todo-list.css" />
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <header class="header">
        <h1>📝 Quản Lý Công Việc</h1>
        <div class="input-group">
          <input
            type="text"
            id="taskInput"
            placeholder="Nhập công việc mới..."
            autocomplete="off"
          />
          <button id="addBtn" class="btn-add">Thêm</button>
        </div>
      </header>

      <!-- Body - Task List -->
      <main class="task-list" id="taskList">
        <!-- Tasks will be dynamically added here -->
        <div class="empty-state">
          <div class="empty-state-icon">📋</div>
          <div class="empty-state-text">
            Chưa có công việc nào. Hãy thêm công việc mới!
          </div>
        </div>

        <div class="task-item" data-id="2">
          <input type="checkbox" class="task-checkbox" /><span class="task-text"
            >Quét nhà</span
          >
          <div class="task-actions">
            <button class="btn-edit">✏️ Sửa</button
            ><button class="btn-delete">🗑️ Xóa</button>
          </div>
        </div>
      </main>

      <!-- Footer -->
      <footer class="footer">
        <div class="task-counter">
          <span id="completedCount">0</span> /
          <span id="totalCount">0</span> công việc hoàn thành
        </div>
      </footer>
    </div>
    <script>

let listTask = [];
let inputTask = document.getElementById("taskInput");
let addBtn = document.getElementById("addBtn");
let taskList = document.getElementById("taskList");

addBtn.addEventListener(`click`, createTask);
inputTask.addEventListener(`keypress`,(e) => {
    if (e.key === `Enter`)
        createTask();
})
function createTask() {
    let valueInput = inputTask.value
    if(valueInput.trim() === ``){
        alert(`Vui lòng nhập tên công việc!`);
        return;
    }
    let newTask = {
        id: Date.now(),
        name: valueInput,
        status: false
    }
    listTask.push(newTask);
    inputTask.value = ``;
    inputTask.focus();
    renderTask();
}

function renderTask() {
    taskList.innerHTML = ``;
    if (listTask.length === 0) {
        taskList.innerHTML = `
            <div>
                <div>📋</div>
                <div>Chưa có công việc nào. Hãy thêm công việc mới!</div>
            </div>
        `;
        return;
    }
    listTask.forEach((task) => {
        let newText = document.createElement('div');

        newText.innerHTML = `
        <div>
            <input type="checkbox" onchange="toggleTaskStatus(${task.id})">
            <p id="task-name-${task.id}" 
               style="${task.status ? 'text-decoration: line-through; opacity: 0.6; color: red' : ''}">
            </p>

            <div class="btn-task">
                <button onclick="updateTask(${task.id})">sua</button>
                <button onclick="deleteTask(${task.id})">xoa</button>
            </div>
        </div>
        `;

        content.appendChild(newText);
    });

    // Cập nhật số lượng task
    updateTaskCounter();
}


function updateTask(id) {
    let findObject = listTask.find((task) => task.id === id);
    let valueInput = document.getElementById(`task-text-${id}`)

    let newInput = document.createElement('input');
    newInput.type = "text";
    newInput.value = findObject.name.trim();
    newInput.className =addBtn

    valueIput.replaceWith(newInput);
    newInput.select();
    newInput.focus();

    function save(){

      let newValue = newInput.value;
          if(newValue.trim() === ``){
              alert(`Tên công việc không được để trống!`);
              return;
          }
          findObject.name = newValue;
          renderTask();
    }

    newInput.addEventListener(`blur`, save);
    newInput.addEventListener(`keypress`,(e) => {
        if (e.key === `Enter`)
            save();
    })

}

  
// delete 
function deleteTask(id) {
  let checkConfirm = confirm(`Bạn có chắc muốn xóa công việc này?`);
  if (!checkConfirm) return;

  listTask = listTask.filter((task) => task.id !== id);
  renderTask();


}
   


document.addEventListener(`DOMContentLoaded`, renderTask);

    </script>
  </body>
</html>
